<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Acesso Restrito · Estação de Pesquisa IDEnza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Cinzel:wght@400;500;600;700&family=Marcellus&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- SPLASH SCREEN -->
    <div class="superia-splash" id="superiaSplash">
        <div class="particles-container">
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        </div>
        <div class="golden-line"></div><div class="golden-line"></div><div class="golden-line"></div>
        <div class="horizontal-line top"></div><div class="horizontal-line bottom"></div>
        <div class="splash-content">
            <div class="brand-tag">Super Agentes · Humanoides · Dados Universais</div>
            <h1 class="splash-title">ID<span>Enza</span></h1>
            <p class="splash-subtitle">Estação de Pesquisa Avançada</p>
            <div class="splash-divider">
                <div class="divider-wing"></div><div class="divider-diamond"></div><div class="divider-wing right"></div>
            </div>
            <button class="enter-btn" id="enterBtn">
                <i class="fas fa-fingerprint" style="margin-right: 10px; font-size: 0.7rem;"></i>Acessar Sistema
            </button>
            <div class="splash-loader">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
        <div class="version-tag">v1.0 · Arquitetura Cognitiva 7 Camadas</div>
    </div>

    <script>
        /* ============================================================
           CONFIGURAÇÃO DE AUTENTICAÇÃO
           A senha é verificada pelo Worker via variável de ambiente
           ============================================================ */
        
        /* URL do endpoint de verificação no SEU Worker */
        const AUTH_WORKER_URL = '/auth/verify';
        
        /* Chave de sessão no localStorage */
        const SESSION_KEY = 'idenza_dashboard_authenticated_v2';
        
        /* Página de destino após autenticação */
        const DESTINO = 'dashboard.html';
        
        /* Tempo de expiração da sessão (8 horas) */
        const SESSAO_EXPIRACAO = 8 * 60 * 60 * 1000;

        let overlay = null;

        /* ==================== VERIFICA SESSÃO EXISTENTE ==================== */
        function verificarSessao() {
            const sessionData = localStorage.getItem(SESSION_KEY);
            if (sessionData) {
                try {
                    const { token, timestamp } = JSON.parse(sessionData);
                    const agora = Date.now();
                    
                    /* Verifica se a sessão ainda é válida */
                    if (agora - timestamp < SESSAO_EXPIRACAO) {
                        /* Sessão válida - redireciona direto */
                        window.location.href = DESTINO;
                        return true;
                    } else {
                        /* Sessão expirada - limpa */
                        localStorage.removeItem(SESSION_KEY);
                    }
                } catch (e) {
                    localStorage.removeItem(SESSION_KEY);
                }
            }
            return false;
        }

        /* ==================== ABRIR MODAL DE SENHA ==================== */
        function abrir() {
            if (overlay) overlay.remove();
            
            overlay = document.createElement('div');
            overlay.className = 'password-overlay';
            overlay.innerHTML = `
                <div class="password-box">
                    <h2>
                        <i class="fas fa-shield-haltered" style="color: #b8860b; margin-right: 8px;"></i>
                        Autenticação Requerida
                    </h2>
                    <div class="gold-line"></div>
                    <p style="color: rgb(255 255 255 / .5); font-size: .65rem; margin-bottom: 1rem; letter-spacing: 1px;">
                        Área restrita para pesquisa avançada
                    </p>
                    <input type="password" id="senha" placeholder="Digite a senha de acesso" autofocus>
                    <div class="error-msg" id="erro"></div>
                    <div class="btn-row">
                        <button class="password-btn" id="cancelar">
                            <i class="fas fa-times" style="margin-right: 6px;"></i>Cancelar
                        </button>
                        <button class="password-btn primary" id="acessar">
                            <i class="fas fa-key" style="margin-right: 6px;"></i>Acessar
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(overlay);
            
            /* Foco no campo de senha */
            setTimeout(() => {
                const campo = document.getElementById('senha');
                if (campo) campo.focus();
            }, 100);
            
            /* Event listeners */
            document.getElementById('acessar').addEventListener('click', verificar);
            document.getElementById('cancelar').addEventListener('click', fechar);
            document.getElementById('senha').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') verificar();
            });
            document.addEventListener('keydown', esc);
        }

        /* ==================== FECHAR MODAL ==================== */
        function fechar() {
            if (overlay) {
                overlay.classList.add('fade-out');
                setTimeout(() => { 
                    if (overlay) overlay.remove(); 
                    overlay = null; 
                }, 300);
            }
            document.removeEventListener('keydown', esc);
        }

        /* ==================== FECHAR COM ESC ==================== */
        function esc(e) { 
            if (e.key === 'Escape') fechar(); 
        }

        /* ==================== VERIFICAR SENHA ==================== */
        async function verificar() {
            const campo = document.getElementById('senha');
            const erro = document.getElementById('erro');
            const senha = campo.value.trim();

            if (!senha) {
                erro.textContent = 'Por favor, digite a senha de acesso.';
                campo.focus();
                return;
            }

            const btn = document.getElementById('acessar');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 6px;"></i>Verificando...';

            try {
                const response = await fetch(AUTH_WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: senha })
                });

                const data = await response.json();

                if (data.success) {
                    /* Salva sessão com timestamp */
                    const sessionData = {
                        token: data.token,
                        timestamp: Date.now()
                    };
                    localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
                    
                    /* Feedback visual de sucesso */
                    erro.style.color = '#22c55e';
                    erro.textContent = '✓ Acesso autorizado! Redirecionando...';
                    
                    /* Redireciona após breve delay */
                    setTimeout(() => {
                        window.location.href = DESTINO;
                    }, 800);
                    
                } else {
                    erro.style.color = '#c78b1a';
                    erro.textContent = data.error || 'Senha incorreta. Tente novamente.';
                    campo.value = '';
                    campo.focus();
                }
            } catch (err) {
                erro.style.color = '#c78b1a';
                erro.textContent = 'Erro de conexão com o servidor. Verifique sua internet.';
                console.error('[AUTH] Erro:', err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key" style="margin-right: 6px;"></i>Acessar';
            }
        }

        /* ==================== INICIALIZAÇÃO ==================== */
        document.addEventListener('DOMContentLoaded', () => {
            /* Verifica se já existe sessão ativa */
            if (!verificarSessao()) {
                /* Se não tem sessão, espera o clique no botão */
                document.getElementById('enterBtn').addEventListener('click', abrir);
            }
        });

        /* Atalho: tecla Enter na splash screen */
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !overlay) {
                abrir();
            }
        });

        /* Previne clique acidental na splash */
        document.getElementById('superiaSplash').addEventListener('click', (e) => { 
            if (e.target === e.currentTarget) e.stopPropagation(); 
        });
    </script>
</body>
</html>
